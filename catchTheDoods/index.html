<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Falling Doods - Dood's Kickassamazin World</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>Catch the Falling Doods</h1>
            <a href="../index.html" class="back-button">← Back to Menu</a>
        </div>

        <div class="game-info">
            <div class="info-item">
                <span class="label">Score:</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="info-item">
                <span class="label">Time:</span>
                <span id="time" class="value">45</span>
            </div>
            <div class="info-item">
                <span class="label">Lives:</span>
                <span id="lives" class="value">❤️❤️❤️</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>

            <div id="endScreen" class="end-screen hidden">
                <div class="end-content">
                    <h2 id="endTitle">Game Over!</h2>
                    <img id="endImage" src="" alt="Dood" class="end-dood-image">
                    <p id="endMessage"></p>
                    <p id="personalBest" class="personal-best"></p>
                    <div id="submitSection" class="submit-section hidden">
                        <input type="text" id="playerName" class="player-name-input" placeholder="Enter your name" maxlength="30">
                        <button id="submitBtn" class="submit-btn">Submit to Leaderboard</button>
                        <p id="submitMessage" class="submit-message"></p>
                    </div>
                    <button id="playAgainBtn" class="play-again-btn">Play Again</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <h3>How to Play:</h3>
            <p><strong>Desktop:</strong> Use arrow keys ← → or move your mouse</p>
            <p><strong>Mobile:</strong> Touch and drag or tilt your device</p>
            <p>Catch the happy Doods to score points! Avoid sad Doods!</p>
        </div>
    </div>

    <script src="../assets/leaderboard.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
